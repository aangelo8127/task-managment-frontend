<div class="form-container">
  <h2>{{ isEditMode() ? 'Editar Tarea' : 'Nueva Tarea' }}</h2>

  @if (errorMessage()) {
    <div class="alert alert-error" role="alert">{{ errorMessage() }}</div>
  }

  <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="title">Título <span class="required">*</span></label>
      <input id="title" type="text" formControlName="title" placeholder="Título de la tarea" />
      @if (taskForm.get('title')?.invalid && taskForm.get('title')?.touched) {
        <small class="error-text">El título es requerido.</small>
      }
    </div>

    <div class="form-group">
      <label for="description">Descripción</label>
      <textarea id="description" formControlName="description" rows="4" placeholder="Descripción de la tarea"></textarea>
    </div>

    @if (isEditMode()) {
      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" formControlName="completed" />
          Completada
        </label>
      </div>
    }

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="taskForm.invalid">
        {{ isEditMode() ? 'Actualizar' : 'Guardar' }}
      </button>
      <button type="button" class="btn btn-cancel" (click)="goBack()">Cancelar</button>
    </div>
  </form>
</div>
