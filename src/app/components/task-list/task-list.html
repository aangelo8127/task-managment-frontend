<div class="task-list-container">
  <div class="header">
    <h2>Lista de Tareas</h2>
    <button class="btn btn-primary" (click)="goToCreate()">+ Nueva Tarea</button>
  </div>

  @if (errorMessage()) {
    <div class="alert alert-error" role="alert">{{ errorMessage() }}</div>
  }

  @if (tasks().length === 0 && !errorMessage()) {
    <p class="empty-message">No hay tareas registradas.</p>
  }

  <ul class="task-items" role="list">
    @for (task of tasks(); track task.id) {
      <li class="task-item" [class.completed]="task.completed">
        <label class="checkbox-label">
          <input
            type="checkbox"
            [checked]="task.completed"
            (change)="toggleCompleted(task)"
            [attr.aria-label]="'Marcar ' + task.title + ' como ' + (task.completed ? 'pendiente' : 'completada')"
          />
          <span class="checkmark"></span>
        </label>
        <div class="task-info">
          <h3 class="task-title">{{ task.title }}</h3>
          <p class="task-description">{{ task.description }}</p>
        </div>
        <div class="task-actions">
          <button class="btn btn-edit" (click)="goToEdit(task.id!)" aria-label="Editar tarea">Editar</button>
          <button class="btn btn-delete" (click)="deleteTask(task.id!)" aria-label="Eliminar tarea">Eliminar</button>
        </div>
      </li>
    }
  </ul>
</div>
